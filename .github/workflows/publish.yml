name: Publish to PyPI

# Publishes on a version tag (e.g. `git tag v0.1.0 && git push --tags`).
# Uses PyPI Trusted Publishing (OIDC) — no API token stored in the repo.
# One-time setup on PyPI: Project -> Settings -> Publishing -> add a trusted
# publisher for owner `sophie-nguyenthuthuy`, repo `judge-audit`,
# workflow `publish.yml`, environment `pypi`.

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write        # required for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
